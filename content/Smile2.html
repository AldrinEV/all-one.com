<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classified (2024)</title>
    <link rel="stylesheet" href="content.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <header class="bg-grey text-white p-3">
        <div class="container">
            <h1>Smile 2</h1>
        </div>
    </header>

    <main class="container my-4">
        <h2>Watch the Trailer</h2>
        <div class="video-container text-center my-3">
            <iframe width="80%" height="315" src="https://www.youtube.com/embed/0HY6QFlBzUY?si=b6IN0hykhZn2MnRw" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
            </iframe>
        </div>
        <div class="download-links text-center mb-3">
            <a id="download1" href="#" class="btn btn-primary">Download 1 (720p)</a>
            <a id="download2" href="#" class="btn btn-primary">Download 2 (1080p)</a>
        </div>
        <p id="movie-description" class="mt-3"></p>
    </main>

    <footer class="text-center p-3">
        <p>&copy; 2024 All&One.com</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        // Movie data
        const movieData = {
            "Classified (2024)": {
                description: "Classified (2024) is an exhilarating thriller that delves into the secrets of a covert organization. With twists and turns at every corner, it keeps audiences on the edge of their seats.",
                downloads: {
                    link1: "https://example.com/path/to/movie_720p.mp4", // Download 1 link (720p)
                    link2: "https://example.com/path/to/movie_1080p.mp4" // Download 2 link (1080p)
                }
            }
        };

        // Automatically set the description and download links based on the current movie
        $(document).ready(function() {
            const movieTitle = "Classified (2024)"; // Change this to the title of the movie you're displaying
            
            // Set description
            $('#movie-description').text(movieData[movieTitle].description);
            
            // Set download links
            $('#download1').attr('href', movieData[movieTitle].downloads.link1);
            $('#download2').attr('href', movieData[movieTitle].downloads.link2);
        });
    </script>
</body>
</html>
